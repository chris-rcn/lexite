<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexite - Word Game</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

  <header>
    <div id="header-left">
      <h1>Lexite</h1>
    </div>
    <div id="scoreboard">
      <div class="score-block">
        <div class="score-label">You</div>
        <div class="score-value" id="player-score">0</div>
      </div>
      <div class="score-divider">vs</div>
      <div class="score-block">
        <div class="score-label">Computer</div>
        <div class="score-value" id="computer-score">0</div>
      </div>
    </div>
    <div id="header-right">
      <button id="btn-new-game">New Game</button>
    </div>
  </header>

  <main>
    <div id="board-container">
      <div id="board">
        <!-- 225 cells generated by game.js -->
      </div>
    </div>

    <aside id="sidebar">
      <div id="bag-info">
        <span id="bag-info-unseen">107 unseen tiles</span><span id="bag-info-bag"> (100 in bag)</span>
      </div>

      <div id="rack-section">
        <div id="rack">
          <!-- tiles rendered by game.js -->
        </div>
      </div>

      <div id="action-buttons">
        <button id="btn-lifeline">Play Lifeline</button>
        <button id="btn-recall">Recall Tiles</button>
        <button id="btn-shuffle">Shuffle Rack</button>
        <button id="btn-play" class="btn-primary">Play Word</button>
      </div>

      <div id="move-log-section">
        <div class="section-label">Move History</div>
        <div id="move-log"></div>
      </div>
    </aside>
  </main>

  <!-- Unseen tiles dialog -->
  <div id="unseen-overlay" class="hidden">
    <div id="unseen-dialog">
      <div id="unseen-grid"></div>
      <button id="unseen-close">Close</button>
    </div>
  </div>

  <!-- Blank tile letter chooser -->
  <div id="blank-overlay" class="hidden">
    <div id="blank-dialog">
      <div id="blank-dialog-title">Choose a letter for your blank tile</div>
      <div id="blank-letter-grid">
        <!-- 26 buttons built by game.js -->
      </div>
      <button id="blank-cancel">Cancel</button>
    </div>
  </div>

  <!-- End-game overlay -->
  <div id="end-overlay" class="hidden">
    <div id="end-dialog">
      <div id="end-title">Game Over</div>
      <div id="end-scores"></div>
      <div id="end-winner"></div>
      <button id="btn-play-again">Play Again</button>
    </div>
  </div>

  <!-- Live score preview bubble -->
  <div id="score-bubble" class="hidden"></div>

  <script src="game.js"></script>
  <footer id="build-stamp"></footer>
  <script>
    var d = new Date(document.lastModified);
    document.getElementById('build-stamp').textContent =
      'built ' + d.getUTCFullYear() + '-' +
      String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
      String(d.getUTCDate()).padStart(2,'0') + ' ' +
      String(d.getUTCHours()).padStart(2,'0') + ':' +
      String(d.getUTCMinutes()).padStart(2,'0') + ' UTC';
  </script>
</body>
</html>
